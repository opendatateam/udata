description:
  en:
    shortDescription: Customizable and skinnable social platform dedicated to open data.
    longDescription: >
      udata is an open source platform designed to catalog, publish and
      share open data. It powers data.gouv.fr, the French government
      open data portal. udata provides dataset management, user
      contributions, harvesting from remote catalogs, spatial and
      temporal indexing, and a plugin architecture for customization.
      It supports multiple output formats and provides a full REST API.
    documentation: https://udata.readthedocs.io
    features:
      - Dataset cataloging and publishing
      - Harvesting from remote sources
      - Community contributions and discussions
      - Spatial and temporal search
      - Plugin and theme architecture
      - Full REST API
